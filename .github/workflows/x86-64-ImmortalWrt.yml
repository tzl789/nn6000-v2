name: x86-64-ImmortalWrt

on:
  workflow_dispatch:
  workflow_call:
  # schedule:
  #   - cron: 0 20 * * *

env:
  REPO_URL: https://github.com/tzl789/openwrt-6.x-me.git
  REPO_BRANCH: master
  CONFIG_FILE: configs/x86-64.config
  GENERAL_CONFIG_FILE: configs/General.config
  DIY_SCRIPT: scripts/Roc-script.sh
  CLASH_KERNEL: amd64
  FIRMWARE_TAG: x86-64
  TZ: Asia/Shanghai

jobs:
  Build:
    runs-on: ubuntu-24.04

    steps:
    - name: Check Server Performance(жЈҖжҹҘжңҚеҠЎеҷЁжҖ§иғҪ)
      run: |
        echo "иӯҰе‘Ҡвҡ "
        echo "еҲҶй…Қзҡ„жңҚеҠЎеҷЁжҖ§иғҪжңүйҷҗпјҢиӢҘйҖүжӢ©зҡ„жҸ’д»¶иҝҮеӨҡпјҢеҠЎеҝ…жіЁж„ҸCPUжҖ§иғҪпјҒ"
        echo -e "е·ІзҹҘCPUеһӢеҸ·пјҲйҷҚеәҸпјүпјҡ7763пјҢ8370CпјҢ8272CLпјҢ8171MпјҢE5-2673 \n"
        echo "--------------------------CPUдҝЎжҒҜ--------------------------"
        echo "CPUзү©зҗҶж•°йҮҸпјҡ$(cat /proc/cpuinfo | grep "physical id" | sort | uniq | wc -l)"
        echo -e "CPUж ёеҝғдҝЎжҒҜпјҡ$(cat /proc/cpuinfo | grep name | cut -f2 -d: | uniq -c) \n"
        echo "--------------------------еҶ…еӯҳдҝЎжҒҜ--------------------------"
        echo "е·Іе®үиЈ…еҶ…еӯҳиҜҰз»ҶдҝЎжҒҜпјҡ"
        echo -e "$(sudo lshw -short -C memory | grep GiB) \n"
        echo "--------------------------зЎ¬зӣҳдҝЎжҒҜ--------------------------"
        echo "зЎ¬зӣҳж•°йҮҸпјҡ$(ls /dev/sd* | grep -v [1-9] | wc -l)" && df -hT

    - name: Initialization Environment(еҲқе§ӢеҢ–зҺҜеўғ)
      env:
        DEBIAN_FRONTEND: noninteractive
      run: |
        sudo -E apt-get -y update
        sudo -E apt-get -y install $(curl -fsSL ophub.org/ubuntu2404-make-openwrt-depends)
        sudo -E systemctl daemon-reload
        sudo timedatectl set-timezone "$TZ"

    - name: Checkout(жЈҖеҮәд»Јз Ғ)
      uses: actions/checkout@main

    - name: Clone Source Code(е…ӢйҡҶжәҗд»Јз Ғ)
      run: |
        df -hT $GITHUB_WORKSPACE
        sudo mkdir -p /mnt/openwrt
        sudo chown -R $(id -u):$(id -g) /mnt/openwrt
        git clone --depth 1 -b $REPO_BRANCH --single-branch $REPO_URL /mnt/openwrt
        cd /mnt/openwrt
        echo "OPENWRT_PATH=$PWD" >> $GITHUB_ENV
        VERSION_INFO=$(git show -s --date=short --format="дҪңиҖ…: %an<br/>ж—¶й—ҙ: %cd<br/>еҶ…е®№: %s<br/>hash: %H")
        echo "VERSION_INFO=$VERSION_INFO" >> $GITHUB_ENV
        VERSION_KERNEL=$(grep -oP 'LINUX_KERNEL_HASH-\K[0-9]+\.[0-9]+\.[0-9]+' target/linux/generic/kernel-6.12)
        echo "VERSION_KERNEL=$VERSION_KERNEL" >> $GITHUB_ENV

    - name: Generate Variables(з”ҹжҲҗеҸҳйҮҸ)
      run: |
        cp $CONFIG_FILE $OPENWRT_PATH/.config
        cd $OPENWRT_PATH
        make defconfig > /dev/null 2>&1
        SOURCE_REPO="$(echo $REPO_URL | awk -F '/' '{print $(NF)}')"
        echo "SOURCE_REPO=$SOURCE_REPO" >> $GITHUB_ENV
        DEVICE_TARGET=$(cat .config | grep CONFIG_TARGET_BOARD | awk -F '"' '{print $2}')
        echo "DEVICE_TARGET=$DEVICE_TARGET" >> $GITHUB_ENV
        DEVICE_SUBTARGET=$(cat .config | grep CONFIG_TARGET_SUBTARGET | awk -F '"' '{print $2}')
        echo "DEVICE_SUBTARGET=$DEVICE_SUBTARGET" >> $GITHUB_ENV
        echo "HASH=$(git log -1 --pretty=format:'%h')" >> $GITHUB_ENV
        echo "CACHE_DATE=$(date +"%Y-%m-%d %H:%M:%S")" >> $GITHUB_ENV

    - name: Cache Toolchain(зј“еӯҳе·Ҙе…·й“ҫ)
      uses: actions/cache@main
      with:
        key: ${{ env.SOURCE_REPO }}-${{ env.REPO_BRANCH }}-${{ env.DEVICE_TARGET }}-${{ env.DEVICE_SUBTARGET }}-${{ env.HASH }} ${{ env.CACHE_DATE }}
        restore-keys: ${{ env.SOURCE_REPO }}-${{ env.REPO_BRANCH }}-${{ env.DEVICE_TARGET }}-${{ env.DEVICE_SUBTARGET }}-
        path: |
          ${{ env.OPENWRT_PATH }}/.ccache
          ${{ env.OPENWRT_PATH }}/staging_dir

    - name: Refresh The Cache(еҲ·ж–°зј“еӯҳ)
      run: |
        if [ -d "$OPENWRT_PATH/staging_dir" ]; then
          find "$OPENWRT_PATH/staging_dir" -type d -name "stamp" -not -path "*target*" | while read -r dir; do
              find "$dir" -type f -exec touch {} +
          done
        fi

    - name: Install Feeds(е®үиЈ…feeds)
      run: |
        cd $OPENWRT_PATH
        ./scripts/feeds update -a
        ./scripts/feeds install -a
  
    - name: Load Custom Configuration(еҠ иҪҪиҮӘе®ҡд№үй…ҚзҪ®)
      run: |
        chmod +x $DIY_SCRIPT
        cd $OPENWRT_PATH
        $GITHUB_WORKSPACE/$DIY_SCRIPT

    - name: Download DL Package(дёӢиҪҪDLиҪҜд»¶еҢ…)
      run: |
        cat $CONFIG_FILE $GENERAL_CONFIG_FILE > $OPENWRT_PATH/.config
        cd $OPENWRT_PATH
        # дҝ®ж”№й…ҚзҪ®ж–Үд»¶
        sed -i '/CONFIG_PACKAGE_sqm-scripts-nss=y/d' .config
        sed -i 's|^\(CONFIG_TARGET_OPTIMIZATION=\).*"|\1"-O3 -pipe -march=x86-64 -mtune=generic"|' .config
        make defconfig
        make download -j$(nproc)

    - name: Compile Firmware(ејҖе§Ӣзј–иҜ‘еӣәд»¶)
      id: compile
      run: |
        cd $OPENWRT_PATH
        echo -e "$(nproc) thread compile"
        make -j$(nproc) || make -j1 || make -j1 V=s
        echo "status=success" >> $GITHUB_OUTPUT
        echo "DATE=$(date +"%Y-%m-%d %H:%M:%S")" >> $GITHUB_ENV
        echo "FILE_DATE=$(date +"%Y.%m.%d")" >> $GITHUB_ENV

    - name: Check Space Usage(жЈҖжҹҘз©әй—ҙдҪҝз”Ёжғ…еҶө)
      if: (!cancelled())
      run: df -hT

    - name: Organize Files(ж•ҙзҗҶж–Үд»¶)
      if: steps.compile.outputs.status == 'success'
      run: |
        cd $OPENWRT_PATH/bin/targets/*/*
        cp $OPENWRT_PATH/.config x86.64.config
        mv config.buildinfo x86.64.config.buildinfo
        mv immortalwrt-x86-64-generic.manifest x86.64.manifest
        mv -f $OPENWRT_PATH/bin/packages/*/*/*.apk packages
        tar -zcf x86.64.Packages.tar.gz packages
        rm -rf packages feeds.buildinfo version.buildinfo sha256sums profiles.json
        echo "FIRMWARE_PATH=$PWD" >> $GITHUB_ENV

    - name: Upload Firmware To Release(еҸ‘еёғеӣәд»¶)
      if: steps.compile.outputs.status == 'success'
      uses: ncipollo/release-action@main
      with:
        name: ${{ env.DATE }} for ${{ env.FIRMWARE_TAG }}
        allowUpdates: true
        tag: ${{ env.FIRMWARE_TAG }}
        token: ${{ secrets.GITHUB_TOKEN }}
        artifacts: ${{ env.FIRMWARE_PATH }}/*
        body: |
          **This is OpenWrt Firmware for ${{ env.FIRMWARE_TAG }}**
          ### рҹ“’ еӣәд»¶дҝЎжҒҜ
          - иҝҷжҳҜеҹәдәҺImmortalWrtдё»зәҝеҲ¶дҪңзҡ„еӣәд»¶пјҢй»ҳи®Өдё»йўҳдёәAuroraпјӣиҜҘеӣәд»¶еңЁImmortalWrtзҡ„еҹәзЎҖдёҠпјҢж·»еҠ дәҶйўқеӨ–зҡ„иҪҜд»¶еҢ…ddnsгҖҒttydгҖҒupnpгҖҒwolгҖҒsamba4гҖҒvlmcsdгҖҒaria2гҖҒautorebootгҖҒuhttpdгҖҒfrpsгҖҒfrpcгҖҒdiskmanгҖҒhd-idleгҖҒbanipгҖҒacmeгҖҒarpbindгҖҒusb-printerгҖҒopenlistгҖҒdockermanгҖҒgecoosacгҖҒluckyгҖҒoafгҖҒsqmгҖҒwireguardгҖҒwatchcatгҖҒwechatpushгҖҒ3catгҖҒpasswall2гҖҒopenclashгҖҒnikkiгҖҒxray-coreгҖҒsing-boxгҖҒhysteriaгҖҒsmartdnsпјҢе№¶ж·»еҠ дәҶиӢҘе№Іе·Ҙе…·пјҢе…·дҪ“иҜҰи§Ғx86-64.configе’ҢGeneral.configгҖӮ
          - рҹ’» иҝҷжҳҜ ${{ env.FIRMWARE_TAG }} е№іеҸ°дҪҝз”Ёзҡ„ OpenWrt еӣәд»¶
          - вҡҪ еӣәд»¶жәҗз Ғ: ${{ env.REPO_URL }}
          - рҹ’қ жәҗз ҒеҲҶж”Ҝ: ${{ env.REPO_BRANCH }}
          - рҹҢҗ й»ҳи®Өең°еқҖ: **192.168.7.1**
          - рҹ”‘ й»ҳи®ӨеҜҶз Ғ: none
          ### рҹ§Ҡ еӣәд»¶зүҲжң¬
          - еӣәд»¶еҶ…ж ёзүҲжң¬пјҡ**${{ env.VERSION_KERNEL }}**
          - еӣәд»¶зј–иҜ‘еүҚжңҖеҗҺдёҖж¬ЎвһҰ[дё»жәҗз Ғ](${{ env.REPO_URL }})жӣҙж–°и®°еҪ•
          - ${{ env.VERSION_INFO }}

    - name: Delete Old Cache(еҲ йҷӨж—§зј“еӯҳ)
      run: |
        # иҺ·еҸ–зј“еӯҳеҲ—иЎЁе№¶еҲ йҷӨ
        gh cache list --key ${{ env.SOURCE_REPO }}-${{ env.REPO_BRANCH }}-${{ env.DEVICE_TARGET }}-${{ env.DEVICE_SUBTARGET }}- --json key --jq '.[] | .key' | while read -r key; do
          gh cache delete "$key"
        done
        # иҫ“еҮәзј“еӯҳзҠ¶жҖҒ
        echo "========cache status========"
        echo "ccache: $(du -sh $OPENWRT_PATH/.ccache | cut -f 1)"
        echo "staging: $(du -sh $OPENWRT_PATH/staging_dir | cut -f 1)"
      env:
        GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
